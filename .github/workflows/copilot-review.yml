name: Copilot PR Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 差分比較のためにフル履歴を取得

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot Review
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          REVIEW_OUTPUT="$(copilot -p "このPRの変更点を確認し、以下の観点でレビューしてください。
          観点:
          1. セキュリティ上の問題（認証情報の漏洩、インジェクション等）
          2. コードの品質（可読性、重複、命名）
          3. 潜在的なバグ

          必ず次の形式で出力してください。評価は『問題なし』『注意』『重大』の3段階のみ。
          チェックリスト:
          - セキュリティ: <問題なし|注意|重大>
          - コード品質: <問題なし|注意|重大>
          - 潜在的バグ: <問題なし|注意|重大>
          総合評価: <問題なし|注意|重大>
          判定理由: <1-3行で簡潔に>")"

          echo "$REVIEW_OUTPUT"

          if ! echo "$REVIEW_OUTPUT" | grep -q "総合評価:"; then
            echo "レビュー出力に総合評価が含まれていないため、CIを失敗させます。"
            exit 1
          fi

          if echo "$REVIEW_OUTPUT" | grep -q "総合評価: 重大"; then
            echo "総合評価が重大のため、CIを失敗させます。"
            exit 1
          fi
